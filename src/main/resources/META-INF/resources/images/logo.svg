<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <!-- Box/cube icon -->
  <g transform="translate(4, 4)">
    <!-- Back face -->
    <rect x="8" y="8" width="40" height="40" rx="4" fill="#0F766E" opacity="0.25"/>
    <!-- Front face -->
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#0F766E"/>
    <!-- Arrow pointing into the box -->
    <path d="M14 20h16M24 14l6 6-6 6" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="68" y="38" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#0F766E">Stash</text>
  <text x="158" y="38" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="28" font-weight="400" fill="#115E59" opacity="0.7">.log</text>
</svg>
